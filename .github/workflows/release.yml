name: Release

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to build and publish both artifacts:
# the bundled script and the importable Firebot setup.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish release with both artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/firebot-stream-end-credits.js
            presets/stream-end-sequence.firebotsetup
          fail_on_unmatched_files: true
          generate_release_notes: true
